# Local SGLang server (OpenAI-compatible). Used for LVM-guided length control experiments.
sglang-local:
  model: "default"
  max_tokens: 6000
  temperature: 1.0
  top_p: 0.999
  extra_body:
    top_k: 15
    min_p: 0.0
  # Enable LVM-guided length control injection (see BaseModel._build_call_args)
  enable_lvm_length_control: true
  lvm_target_length_mode: "total"
  lvm_value_constraint: "eq"
  # Retry once; long-context errors are deterministic and should not be retried.
  max_retries: 1
  lvm_gamma: 0.997
  system_prompt: "You are Qwen, created by Alibaba Cloud. You are a helpful assistant."
  # Optional: prepend a fixed prefix to every user prompt.
  enable_user_prompt_prefix: true
  user_prompt_prefix: "Please follow the instructions below.\n\n"
  # Rewrite strict "equal to" wording into "approximately" (EN/CN) for length control.
  soften_equal_to_wording: false
  # Which length metric to store in `word_count` for evaluation:
  # - completion_tokens (default): use OpenAI-style usage.completion_tokens (recommended for SGLang)
  # - word_count: use benchmark's count_words() (CN chars + EN words)
  length_metric: "completion_tokens"

